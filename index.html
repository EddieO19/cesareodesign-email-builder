<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LCD Email Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple:    #3c2a51;
  --charcoal:  #3a403f;
  --olive:     #55502b;
  --brown:     #55392b;
  --forest:    #333e27;
  --terra:     #744033;
  --cream:     #f2ede4;
  --parchment: #faf7f2;
  --rule:      #d8d0c4;
  --muted:     #7a7268;
}
body { font-family: 'Jost', sans-serif; font-weight: 300; background: var(--cream); color: var(--charcoal); min-height: 100vh; }
.app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
.sidebar { width: 278px; flex-shrink: 0; background: var(--purple); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 28px 22px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.22); }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 10px; letter-spacing: 0.38em; text-transform: uppercase; color: rgba(255,255,255,0.36); margin-bottom: 10px; }
.sidebar-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: #f4f0eb; line-height: 1.1; }
.sidebar-title em { font-style: italic; color: rgba(255,255,255,0.38); font-size: 23px; }
.sidebar-nav { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.38); cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: 'Jost', sans-serif; transition: color 0.15s; }
.nav-item:hover { color: rgba(255,255,255,0.74); }
.nav-item.active { color: #f4f0eb; }
.nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }
.history-section { flex: 1; overflow-y: auto; padding: 14px 0; }
.history-label { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.22); padding: 0 20px 10px; }
.version-item { padding: 10px 20px; cursor: pointer; border-left: 2px solid transparent; transition: all 0.15s; }
.version-item:hover { background: rgba(255,255,255,0.05); border-left-color: rgba(255,255,255,0.2); }
.version-item.active-v { border-left-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.07); }
.version-name { font-size: 12px; color: rgba(255,255,255,0.78); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.version-date { font-size: 10px; color: rgba(255,255,255,0.3); }
.version-actions { display: flex; gap: 5px; margin-top: 7px; }
.version-btn { font-size: 9px; letter-spacing: 0.1em; padding: 3px 8px; border: 1px solid rgba(255,255,255,0.18); background: transparent; color: rgba(255,255,255,0.42); cursor: pointer; border-radius: 2px; font-family: 'Jost', sans-serif; transition: all 0.15s; }
.version-btn:hover { border-color: rgba(255,255,255,0.55); color: rgba(255,255,255,0.85); }
.version-btn.danger:hover { border-color: #c07060; color: #c07060; }
.empty-history { padding: 20px; font-size: 12px; color: rgba(255,255,255,0.22); line-height: 1.75; }
.sidebar-footer { padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.07); }
.new-btn { width: 100%; padding: 10px; background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.72); border: 1px solid rgba(255,255,255,0.15); font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.new-btn:hover { background: rgba(255,255,255,0.15); color: #f4f0eb; }

/* MAIN */
.main { flex: 1; display: flex; overflow: hidden; }

/* FORM */
.form-panel { width: 370px; flex-shrink: 0; background: var(--parchment); overflow-y: auto; border-right: 1px solid var(--rule); display: flex; flex-direction: column; }
.form-header { padding: 20px 22px 14px; border-bottom: 1px solid var(--rule); background: var(--parchment); position: sticky; top: 0; z-index: 10; }
.form-header-title { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 400; color: var(--charcoal); margin-bottom: 2px; }
.form-header-sub { font-size: 11px; color: var(--muted); }
.form-body { padding: 18px 22px; flex: 1; }
.form-section { margin-bottom: 26px; }
.form-section-title { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--terra); margin-bottom: 12px; padding-bottom: 7px; border-bottom: 1px solid var(--rule); }
.form-section-sub { font-size: 9px; color: var(--muted); font-weight: 300; letter-spacing: 0.03em; text-transform: none; margin-left: 6px; }
.field { margin-bottom: 11px; }
.field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.field input, .field textarea { width: 100%; background: var(--cream); border: 1px solid var(--rule); color: var(--charcoal); font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 300; padding: 7px 9px; outline: none; transition: border-color 0.15s; border-radius: 0; -webkit-appearance: none; }
.field input:focus, .field textarea:focus { border-color: var(--olive); }
.field textarea { resize: vertical; min-height: 68px; line-height: 1.6; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* ACTION CARDS */
.action-card { background: var(--cream); border: 1px solid var(--rule); border-left: 3px solid var(--terra); padding: 12px; margin-bottom: 10px; }
.action-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.type-select { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 8px; border: 1px solid var(--rule); background: var(--parchment); color: var(--charcoal); font-family: 'Jost', sans-serif; cursor: pointer; outline: none; }
.remove-card-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 17px; line-height: 1; padding: 2px 5px; transition: color 0.15s; }
.remove-card-btn:hover { color: var(--terra); }
.inline-field { margin-bottom: 8px; }
.inline-field label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 3px; }
.inline-field input, .inline-field textarea { width: 100%; background: var(--parchment); border: 1px solid var(--rule); color: var(--charcoal); font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 300; padding: 6px 8px; outline: none; border-radius: 0; }
.inline-field textarea { resize: vertical; min-height: 50px; line-height: 1.55; }
.inline-field input:focus, .inline-field textarea:focus { border-color: var(--olive); }
.urgent-row { display: flex; align-items: center; gap: 7px; margin-top: 4px; }
.urgent-row input[type=checkbox] { width: auto; accent-color: var(--terra); }
.urgent-row label { font-size: 11px; color: var(--muted); margin: 0; }

/* WIN CARDS */
.win-card { background: var(--cream); border: 1px solid var(--rule); border-left: 3px solid var(--forest); padding: 12px; margin-bottom: 10px; }

/* PHASES */
.phase-row { display: grid; grid-template-columns: 1fr auto 28px; gap: 8px; align-items: center; margin-bottom: 8px; }
.status-cycle { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; padding: 5px 9px; border: none; cursor: pointer; white-space: nowrap; font-family: 'Jost', sans-serif; transition: opacity 0.15s; }
.status-cycle:hover { opacity: 0.8; }

/* PAYMENT ROWS */
.payment-row { display: grid; grid-template-columns: 1fr 76px 28px; gap: 8px; align-items: end; margin-bottom: 8px; }

.add-row-btn { width: 100%; padding: 8px; border: 1px dashed var(--rule); background: transparent; color: var(--muted); font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.1em; cursor: pointer; margin-top: 4px; transition: all 0.15s; }
.add-row-btn:hover { border-color: var(--olive); color: var(--olive); }
.add-row-btn.win-add:hover { border-color: var(--forest); color: var(--forest); }

/* FORM FOOTER */
.form-footer { padding: 14px 22px; border-top: 1px solid var(--rule); background: var(--parchment); position: sticky; bottom: 0; display: flex; gap: 10px; }
.generate-btn { flex: 1; padding: 11px; background: var(--forest); color: #f4f0eb; border: none; font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.24em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; }
.generate-btn:hover { opacity: 0.85; }
.save-btn { padding: 11px 15px; background: transparent; color: var(--charcoal); border: 1px solid var(--rule); font-family: 'Jost', sans-serif; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.save-btn:hover { border-color: var(--olive); color: var(--olive); }

/* PREVIEW */
.preview-panel { flex: 1; display: flex; flex-direction: column; background: #ddd6cc; overflow: hidden; }
.preview-toolbar { display: flex; align-items: center; gap: 8px; padding: 9px 14px; background: var(--parchment); border-bottom: 1px solid var(--rule); flex-shrink: 0; }
.preview-toolbar-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); flex: 1; }
.width-btn { font-size: 10px; padding: 4px 10px; border: 1px solid var(--rule); background: transparent; color: var(--muted); cursor: pointer; font-family: 'Jost', sans-serif; transition: all 0.15s; }
.width-btn:hover, .width-btn.active-w { border-color: var(--olive); color: var(--charcoal); background: rgba(85,80,43,0.09); }
.copy-btn { font-size: 10px; padding: 5px 14px; border: none; background: var(--terra); color: #f4f0eb; cursor: pointer; font-family: 'Jost', sans-serif; letter-spacing: 0.12em; text-transform: uppercase; transition: opacity 0.15s; }
.copy-btn:hover { opacity: 0.85; }
.preview-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; }
#preview-frame { border: none; background: #fff; width: 100%; max-width: 640px; height: 800px; display: block; }

/* MODAL */
.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(30,18,42,0.65); z-index: 100; align-items: center; justify-content: center; }
.modal-backdrop.open { display: flex; }
.modal { background: var(--parchment); padding: 28px; width: 340px; border-top: 3px solid var(--olive); }
.modal h3 { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 400; margin-bottom: 16px; color: var(--charcoal); }
.modal input { width: 100%; background: var(--cream); border: 1px solid var(--rule); color: var(--charcoal); font-family: 'Jost', sans-serif; font-size: 13px; padding: 9px 10px; outline: none; margin-bottom: 16px; border-radius: 0; }
.modal input:focus { border-color: var(--olive); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.modal-cancel { padding: 8px 16px; background: transparent; border: 1px solid var(--rule); color: var(--muted); font-family: 'Jost', sans-serif; font-size: 11px; cursor: pointer; }
.modal-confirm { padding: 8px 18px; background: var(--forest); border: none; color: #f4f0eb; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 0.15em; cursor: pointer; transition: opacity 0.15s; }
.modal-confirm:hover { opacity: 0.85; }

.toast { position: fixed; bottom: 22px; right: 22px; background: var(--charcoal); color: #f4f0eb; font-size: 12px; letter-spacing: 0.08em; padding: 10px 18px; border-left: 3px solid var(--olive); opacity: 0; transform: translateY(6px); transition: all 0.2s; pointer-events: none; z-index: 200; }
.toast.show { opacity: 1; transform: translateY(0); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--rule); }
</style>
</head>

<div class="toast" id="toast"></div>

<script>
var wins=[
  {title:'Furniture orders confirmed',desc:'All six pieces from our Heal\'s selection have been ordered and confirmed. Lead time is 8 weeks, on track for the July install.'},
  {title:'Design development signed off',desc:'Final design drawings approved by both parties. A significant milestone — the vision is locked in.'}
];
var actions=[
  {type:'payment',title:'Stage 3 Invoice',desc:'Covering procurement fees and fabric order. Payment unlocks the cut order and avoids delays to the July timeline.',due:'Due 9 May - critical path item',urgent:true},
  {type:'decision',title:'Stone selection - Comblanchien vs Chassagne',desc:'Both samples are with you. The mason releases slab allocation on Friday.',due:'Needed by Friday 10 May',urgent:false},
  {type:'approval',title:'Revised study layout - Drawing 04B',desc:'Bookcase repositioned 40cm west to improve light into the reading nook. Carpenter is waiting on your green light.',due:'Reply to this email to approve',urgent:false}
];
var phases=[
  {name:'Design development',status:'complete'},
  {name:'Material procurement',status:'awaiting'},
  {name:'Furniture orders',status:'confirmed'}
];
var payments=[
  {label:'Stage 2 - Design fee',amount:'6,200',date:'Paid 3 Mar 2025'},
  {label:'Stage 3 - Procurement',amount:'4,850',date:'Due 9 May 2025'},
  {label:'Stage 4 - Installation',amount:'5,500',date:'Due on completion'}
];
var generatedHTML='';
var activeVersionId=null;
const AIRTABLE_TOKEN = 'patDJQQxBou1B4Ks2';
const AIRTABLE_BASE_ID = 'apppbaEBT6QWth4I8';
const AIRTABLE_TABLE = 'Table 1';

const AIRTABLE_URL =
  `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE)}`;
  async function getVersions() {
  try {

    const res = await fetch(AIRTABLE_URL, {
      headers: {
        Authorization: `Bearer ${AIRTABLE_TOKEN}`
      }
    });

    const data = await res.json();

    return data.records.map(r => ({
      id: r.id,
      name: r.fields.version_name || 'Untitled',
      date: r.fields.created_at || '',

      data: {
        name: r.fields.client_name || '',
        project: r.fields.project_name || '',
        week: r.fields.week_of || '',
        issue: r.fields.issue_no || '',
        completion: r.fields.completion_date || '',
        notes: r.fields.notes || '',
        inspo: r.fields.inspiration || '',

        wins: JSON.parse(r.fields.wins_json || '[]'),
        actions: JSON.parse(r.fields.actions_json || '[]'),
        phases: JSON.parse(r.fields.phases_json || '[]'),
        payments: JSON.parse(r.fields.payments_json || '[]')
      }
    }));

  } catch (e) {
    console.error(e);
    return [];
  }
}

var statusCycle=['complete','awaiting','confirmed','inprogress'];
var statusMeta={
  complete:  {label:'Complete',       bg:'#dde8dc',color:'#2a4a2c'},
  awaiting:  {label:'Awaiting client',bg:'#e8dfc6',color:'#5a3e10'},
  confirmed: {label:'Confirmed',      bg:'#d8dce8',color:'#1e2e5a'},
  inprogress:{label:'In progress',    bg:'#dddad4',color:'#4a4540'}
};
var typeMeta={
  payment: {label:'Payment', color:'#5a2a18',bg:'#e8c8b8',border:'#d4a888'},
  decision:{label:'Decision',color:'#3a3010',bg:'#ddd8b0',border:'#c4bc80'},
  approval:{label:'Approval',color:'#182818',bg:'#b8ccb8',border:'#88aa88'}
};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderWins(){
  var el=document.getElementById('wins-list');
  if(!wins.length){el.innerHTML='';return;}
  el.innerHTML=wins.map(function(w,i){
    return '<div class="win-card">'+
      '<div class="action-card-top">'+
        '<span style="font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--forest);font-family:Jost,sans-serif">Win</span>'+
        '<button class="remove-card-btn" onclick="removeWin('+i+')">&times;</button>'+
      '</div>'+
      '<div class="inline-field"><label>What was accomplished</label><input type="text" value="'+esc(w.title)+'" oninput="wins['+i+'].title=this.value" placeholder="Furniture orders confirmed" /></div>'+
      '<div class="inline-field" style="margin-bottom:0"><label>Brief detail (optional)</label><textarea oninput="wins['+i+'].desc=this.value" placeholder="A sentence or two on what this means for the project...">'+esc(w.desc)+'</textarea></div>'+
    '</div>';
  }).join('');
}
function removeWin(i){wins.splice(i,1);renderWins();}
function addWin(){wins.push({title:'',desc:''});renderWins();}

function renderActions(){
  var el=document.getElementById('actions-list');
  el.innerHTML=actions.map(function(a,i){
    return '<div class="action-card">'+
      '<div class="action-card-top">'+
        '<select class="type-select" onchange="actions['+i+'].type=this.value">'+
          ['payment','decision','approval'].map(function(t){return '<option value="'+t+'"'+(a.type===t?' selected':'')+'>'+t.charAt(0).toUpperCase()+t.slice(1)+'</option>';}).join('')+
        '</select>'+
        '<button class="remove-card-btn" onclick="removeAction('+i+')">&times;</button>'+
      '</div>'+
      '<div class="inline-field"><label>Title</label><input type="text" value="'+esc(a.title)+'" oninput="actions['+i+'].title=this.value" /></div>'+
      '<div class="inline-field"><label>Description</label><textarea oninput="actions['+i+'].desc=this.value">'+esc(a.desc)+'</textarea></div>'+
      '<div class="inline-field"><label>Due / call-to-action line</label><input type="text" value="'+esc(a.due)+'" oninput="actions['+i+'].due=this.value" /></div>'+
      '<div class="urgent-row"><input type="checkbox" id="urg'+i+'" '+(a.urgent?'checked':'')+' onchange="actions['+i+'].urgent=this.checked" /><label for="urg'+i+'">Mark as urgent</label></div>'+
    '</div>';
  }).join('');
}
function removeAction(i){actions.splice(i,1);renderActions();}
function addAction(){actions.push({type:'decision',title:'',desc:'',due:'',urgent:false});renderActions();}

function renderPhases(){
  var el=document.getElementById('phases-list');
  el.innerHTML=phases.map(function(p,i){
    var s=statusMeta[p.status]||statusMeta.inprogress;
    return '<div class="phase-row">'+
      '<input type="text" value="'+esc(p.name)+'" oninput="phases['+i+'].name=this.value" placeholder="Phase name" style="font-family:Jost,sans-serif;font-size:12px;font-weight:300;padding:6px 8px;border:1px solid var(--rule);background:var(--cream);color:var(--charcoal);outline:none;width:100%" />'+
      '<button class="status-cycle" style="background:'+s.bg+';color:'+s.color+'" onclick="cyclePhase('+i+')" title="Click to cycle">'+s.label+'</button>'+
      '<button class="remove-card-btn" onclick="removePhase('+i+')">&times;</button>'+
    '</div>';
  }).join('');
}
function cyclePhase(i){var c=statusCycle;phases[i].status=c[(c.indexOf(phases[i].status)+1)%c.length];renderPhases();}
function removePhase(i){phases.splice(i,1);renderPhases();}
function addPhase(){phases.push({name:'',status:'inprogress'});renderPhases();}

function renderPayments(){
  var el=document.getElementById('payments-list');
  var si='font-family:Jost,sans-serif;font-size:12px;font-weight:300;padding:6px 8px;border:1px solid var(--rule);background:var(--cream);color:var(--charcoal);outline:none;width:100%';
  el.innerHTML=payments.map(function(p,i){
    return '<div class="payment-row">'+
      '<div>'+
        '<div style="font-size:10px;color:var(--muted);margin-bottom:3px">Description</div>'+
        '<input type="text" value="'+esc(p.label)+'" oninput="payments['+i+'].label=this.value" style="'+si+'" />'+
        '<div style="font-size:10px;color:var(--muted);margin-top:5px;margin-bottom:3px">Date / note</div>'+
        '<input type="text" value="'+esc(p.date)+'" oninput="payments['+i+'].date=this.value" style="'+si+'" />'+
      '</div>'+
      '<div>'+
        '<div style="font-size:10px;color:var(--muted);margin-bottom:3px">Amount</div>'+
        '<input type="text" value="'+esc(p.amount)+'" oninput="payments['+i+'].amount=this.value" style="'+si+'" />'+
      '</div>'+
      '<button class="remove-card-btn" style="align-self:flex-end;padding-bottom:6px" onclick="removePayment('+i+')">&times;</button>'+
    '</div>';
  }).join('');
}
function removePayment(i){payments.splice(i,1);renderPayments();}
function addPayment(){payments.push({label:'',amount:'',date:''});renderPayments();}

function buildHTML(){
  var fn=document.getElementById('f-name').value||'there';
  var proj=document.getElementById('f-project').value||'Your project';
  var week=document.getElementById('f-week').value||'';
  var issue=document.getElementById('f-issue').value||'';
  var compRaw=document.getElementById('f-completion').value||'';
  var comp='TBC'; if(compRaw){ var dp=compRaw.split('-'); if(dp.length===3){ var months=['January','February','March','April','May','June','July','August','September','October','November','December']; comp=parseInt(dp[2],10)+' '+months[parseInt(dp[1],10)-1]+' '+dp[0]; } }
  var notes=document.getElementById('f-notes').value||'';
  var inspo=document.getElementById('f-inspo').value||'';

  var PU='#3c2a51',CH='#3a403f',OL='#55502b',BR='#55392b',FO='#333e27',TE='#744033';
  var CR='#f2ede4',PA='#faf7f2',RU='#d8d0c4',MU='#7a7268';

  /* Wins band — warm parchment tone, forest green accents */
  var winsRows=wins.map(function(w){
    return '<div style="padding:16px 0;border-bottom:1px solid rgba(51,62,39,0.12);display:flex;gap:14px;align-items:flex-start">'+
      '<div style="width:20px;height:20px;border-radius:50%;background:'+FO+';flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center">'+
        '<svg width="10" height="10" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,6 5,9 10,3" stroke="#faf7f2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
      '</div>'+
      '<div>'+
        '<div style="font-family:Georgia,serif;font-size:15px;color:'+CH+';margin-bottom:4px;line-height:1.3">'+esc(w.title)+'</div>'+
        (w.desc?'<div style="font-size:12px;line-height:1.75;color:'+MU+';font-family:Jost,sans-serif;font-weight:300">'+esc(w.desc)+'</div>':'')+
      '</div>'+
    '</div>';
  }).join('');

  var winsBand=wins.length?(
    '<div style="background:#ede8de;padding:0 50px;border-bottom:1px solid '+RU+'">'+
      '<div style="display:flex;align-items:center;gap:12px;padding:18px 0 14px;border-bottom:1px solid rgba(51,62,39,0.12)">'+
        '<div style="width:7px;height:7px;border-radius:50%;background:'+FO+';flex-shrink:0"></div>'+
        '<span style="font-size:9px;letter-spacing:0.34em;text-transform:uppercase;color:'+FO+';font-family:Jost,sans-serif">This week\'s progress</span>'+
        '<span style="margin-left:auto;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(51,62,39,0.45);font-family:Jost,sans-serif">'+wins.length+' completed</span>'+
      '</div>'+
      winsRows+
    '</div>'
  ):'';

  /* Action band — charcoal lightened to a warm dark tone */
  var aRows=actions.map(function(a){
    var t=typeMeta[a.type]||typeMeta.decision;
    return '<div style="padding:18px 0;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;gap:16px;align-items:flex-start">'+
      '<span style="font-size:8px;letter-spacing:0.2em;text-transform:uppercase;padding:4px 9px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:'+t.bg+';color:'+t.color+';border:1px solid '+t.border+';font-family:Jost,sans-serif">'+t.label+'</span>'+
      '<div>'+
        '<div style="font-family:Georgia,serif;font-size:16px;color:#ede8de;margin-bottom:4px;line-height:1.25">'+esc(a.title)+'</div>'+
        '<div style="font-size:12px;line-height:1.75;color:rgba(237,232,222,0.52)">'+esc(a.desc)+'</div>'+
        '<div style="margin-top:8px;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;font-family:Jost,sans-serif;color:'+(a.urgent?'#c07868':'rgba(237,232,222,0.4)')+'">'+esc(a.due)+'</div>'+
      '</div>'+
    '</div>';
  }).join('');

  /* Lighter action band background — desaturated plum rather than full charcoal */
  var ab=actions.length?(
    '<div style="background:#4a4252;padding:0 50px">'+
      '<div style="display:flex;align-items:center;gap:12px;padding:20px 0 15px;border-bottom:1px solid rgba(255,255,255,0.08)">'+
        '<div style="width:7px;height:7px;border-radius:50%;background:'+TE+';flex-shrink:0"></div>'+
        '<span style="font-size:9px;letter-spacing:0.34em;text-transform:uppercase;color:rgba(237,232,222,0.6);font-family:Jost,sans-serif">Your attention required</span>'+
        '<span style="margin-left:auto;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(237,232,222,0.28);font-family:Jost,sans-serif">'+actions.length+' open item'+(actions.length!==1?'s':'')+'</span>'+
      '</div>'+
      aRows+
    '</div>'
  ):'';

  var pRows=phases.map(function(p){
    var s=statusMeta[p.status]||statusMeta.inprogress;
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid '+RU+'">'+
      '<span style="font-size:11px;letter-spacing:0.09em;text-transform:uppercase;color:'+MU+';font-family:Jost,sans-serif">'+esc(p.name)+'</span>'+
      '<span style="font-size:9px;letter-spacing:0.15em;text-transform:uppercase;padding:4px 9px;background:'+s.bg+';color:'+s.color+';font-family:Jost,sans-serif">'+s.label+'</span>'+
    '</div>';
  }).join('');

  var pmRows=payments.map(function(p){
    var lo=(p.date+p.label).toLowerCase();
    var ac=lo.includes('paid')?'#3a6040':lo.includes('due')?TE:MU;
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid '+RU+'">'+
      '<div>'+
        '<div style="font-size:12px;color:'+CH+';font-family:Jost,sans-serif;font-weight:300">'+esc(p.label)+'</div>'+
        '<div style="font-size:10px;letter-spacing:0.09em;color:'+MU+';margin-top:2px;font-family:Jost,sans-serif">'+esc(p.date)+'</div>'+
      '</div>'+
      '<div style="font-family:Georgia,serif;font-size:18px;font-weight:500;color:'+ac+'">&#163;'+esc(p.amount)+'</div>'+
    '</div>';
  }).join('');

  var meta='';
  if(week||issue){
    meta='<div style="display:flex;align-items:center;gap:16px">';

    if(week&&issue) meta+='<div style="width:3px;height:3px;border-radius:50%;background:'+OL+';opacity:0.7"></div>';
    if(issue) meta+='<span style="font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(250,247,242,0.38);font-family:Jost,sans-serif">Issue No. '+esc(issue)+'</span>';
    meta+='</div>';
  }

  var pb=phases.length?'<div style="margin-bottom:38px">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+

      '<div style="height:1px;flex:1;background:'+RU+'"></div>'+
    '</div>'+
    '<h2 style="font-family:Georgia,serif;font-size:24px;font-weight:400;color:'+CH+';margin-bottom:12px">Where things stand</h2>'+
    '<div style="background:'+CR+';border-left:3px solid '+OL+';padding:20px 24px">'+
      '<div style="font-family:Georgia,serif;font-size:16px;font-weight:500;color:'+CH+';margin-bottom:13px">'+esc(proj)+'</div>'+
      pRows+
      '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0">'+
        '<span style="font-size:11px;letter-spacing:0.09em;text-transform:uppercase;color:'+MU+';font-family:Jost,sans-serif">Estimated completion</span>'+
        '<span style="font-family:Georgia,serif;font-size:16px;color:'+CH+'">'+esc(comp)+'</span>'+
      '</div>'+
    '</div>'+
  '</div>':'';

  var pmb=payments.length?'<div style="margin-bottom:38px">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+
      '<span style="font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:'+FO+';white-space:nowrap;font-family:Jost,sans-serif">Payment schedule</span>'+
      '<div style="height:1px;flex:1;background:'+RU+'"></div>'+
    '</div>'+
    '<h2 style="font-family:Georgia,serif;font-size:24px;font-weight:400;color:'+CH+';margin-bottom:12px">Financial milestones</h2>'+
    '<div style="background:'+CR+';border-left:3px solid '+TE+';padding:20px 24px">'+
      '<div style="font-size:9px;letter-spacing:0.26em;text-transform:uppercase;color:'+TE+';margin-bottom:13px;font-family:Jost,sans-serif">'+esc(proj)+' &#8212; payment summary</div>'+
      pmRows+
      '<a href="#" style="display:inline-block;margin-top:15px;background:'+CH+';color:'+PA+';text-decoration:none;font-size:9px;letter-spacing:0.24em;text-transform:uppercase;padding:10px 20px;font-family:Jost,sans-serif">View &amp; pay invoice</a>'+
    '</div>'+
  '</div>':'';

  var ib=inspo?'<div style="margin-bottom:38px">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+

      '<div style="height:1px;flex:1;background:'+RU+'"></div>'+
    '</div>'+
    '<h2 style="font-family:Georgia,serif;font-size:24px;font-weight:400;color:'+CH+';margin-bottom:12px">This week\'s reference</h2>'+
    '<p style="font-size:14px;line-height:1.9;color:'+MU+';font-family:Jost,sans-serif;font-weight:300">'+esc(inspo)+'</p>'+
  '</div>':'';

  return '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">'+
    '<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">'+
    '<style>*{box-sizing:border-box;margin:0;padding:0}body{background:'+CR+';font-family:Jost,sans-serif;font-weight:300;color:'+CH+';-webkit-font-smoothing:antialiased}</style>'+

        '<a href="mailto:hello@cesareodesign.com" style="display:inline-block;background:'+PA+';color:'+BR+';text-decoration:none;font-size:10px;font-weight:500;letter-spacing:0.24em;text-transform:uppercase;padding:12px 24px;white-space:nowrap;font-family:Jost,sans-serif">Reply to studio</a>'+
      '</div>'+

      '<div style="padding:34px 50px 42px;border-top:1px solid '+RU+'">'+
        '<div style="font-family:Georgia,serif;font-size:14px;letter-spacing:0.14em;color:'+CH+';margin-bottom:14px">Cesareo Design</div>'+
        '<div style="font-size:12px;line-height:2;color:'+MU+';font-family:Jost,sans-serif">hello@cesareodesign.com</div>'+

}

function generateAndPreview(){
  generatedHTML=buildHTML();
  var frame=document.getElementById('preview-frame');
  var doc=frame.contentDocument||frame.contentWindow.document;
  doc.open();doc.write(generatedHTML);doc.close();
  frame.style.height='10px';
  setTimeout(function(){
    try{frame.style.height=(frame.contentWindow.document.body.scrollHeight+40)+'px';}
    catch(e){frame.style.height='900px';}
  },300);
  showToast('Preview updated');
}

function copyHTML(){
  if(!generatedHTML) generateAndPreview();
  setTimeout(function(){
    navigator.clipboard.writeText(generatedHTML).then(function(){showToast('HTML copied to clipboard');}).catch(function(){
      var ta=document.createElement('textarea');ta.value=generatedHTML;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('HTML copied to clipboard');
    });
  },generatedHTML?0:380);
}

function setWidth(w,btn){
  document.getElementById('preview-frame').style.maxWidth=w;
  document.querySelectorAll('.width-btn').forEach(function(b){b.classList.remove('active-w');});
  btn.classList.add('active-w');
}

function showPanel(p){
  document.querySelectorAll('.nav-item').forEach(function(b,i){b.classList.toggle('active',(p==='form'&&i===0)||(p==='preview'&&i===1));});
}

function openSaveModal(){
  var d=new Date();
  document.getElementById('save-name').value='Update - '+d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('save-modal').classList.add('open');
  setTimeout(function(){document.getElementById('save-name').select();},50);
}
function closeSaveModal(){document.getElementById('save-modal').classList.remove('open');}

async function saveVersion() {

  var name = document.getElementById('save-name').value.trim();

  if (!name) return;

  const payload = {
    fields: {

      version_name: name,
      created_at: new Date().toISOString(),

      client_name: document.getElementById('f-name').value,
      project_name: document.getElementById('f-project').value,
      week_of: document.getElementById('f-week').value,
      issue_no: document.getElementById('f-issue').value,
      completion_date: document.getElementById('f-completion').value,

      notes: document.getElementById('f-notes').value,
      inspiration: document.getElementById('f-inspo').value,

      wins_json: JSON.stringify(wins),
      actions_json: JSON.stringify(actions),
      phases_json: JSON.stringify(phases),
      payments_json: JSON.stringify(payments)
    }
  };

  try {

    await fetch(AIRTABLE_URL, {
      method: 'POST',

      headers: {
        Authorization: `Bearer ${AIRTABLE_TOKEN}`,
        'Content-Type': 'application/json'
      },

      body: JSON.stringify(payload)
    });

    closeSaveModal();

    await renderVersionList();

    showToast('Saved to Airtable');

  } catch (e) {

    console.error(e);

    showToast('Save failed');
  }
}

async function loadVersion(id){
  var versions = await getVersions();

var v = versions.find(function(x){
  return x.id===id;
});
  if(!v) return;
  var d=v.data;
  document.getElementById('f-name').value=d.name||'';
  document.getElementById('f-project').value=d.project||'';
  document.getElementById('f-week').value=d.week||'';
  document.getElementById('f-issue').value=d.issue||'';
  document.getElementById('f-completion').value=d.completion||'';
  document.getElementById('f-notes').value=d.notes||'';
  document.getElementById('f-inspo').value=d.inspo||'';
  wins=JSON.parse(JSON.stringify(d.wins||[]));
  actions=JSON.parse(JSON.stringify(d.actions||[]));
  phases=JSON.parse(JSON.stringify(d.phases||[]));
  payments=JSON.parse(JSON.stringify(d.payments||[]));
  renderWins();renderActions();renderPhases();renderPayments();
  activeVersionId=id;
  renderVersionList();
  generateAndPreview();
  showToast('Loaded: '+v.name);
}

function duplicateVersion(id){
  var v=getVersions().find(function(x){return x.id===id;});
  if(!v) return;
  var copy=JSON.parse(JSON.stringify(v));
  copy.id=Date.now();
  copy.name=v.name+' (copy)';
  copy.date=new Date().toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  var versions=getVersions();versions.unshift(copy);saveVersions(versions);
  loadVersion(copy.id);
  showToast('Duplicated: '+v.name);
}

function deleteVersion(id){
  saveVersions(getVersions().filter(function(x){return x.id!==id;}));
  if(activeVersionId===id) activeVersionId=null;
  renderVersionList();
  showToast('Version deleted');
}

async function renderVersionList(){
 var versions = await getVersions();
  var el=document.getElementById('version-list');
  if(!versions.length){el.innerHTML='<div class="empty-history">No saved versions yet.<br>Fill in the form and hit Save.</div>';return;}
  el.innerHTML=versions.map(function(v){
    return '<div class="version-item'+(activeVersionId===v.id?' active-v':'')+'">'+
      '<div class="version-name">'+esc(v.name)+'</div>'+
      '<div class="version-date">'+esc(v.date)+'</div>'+
      '<div class="version-actions">'+
        '<button class="version-btn" onclick="loadVersion('+v.id+')">Load</button>'+
        '<button class="version-btn" onclick="duplicateVersion('+v.id+')">Duplicate</button>'+
        '<button class="version-btn danger" onclick="deleteVersion('+v.id+')">Delete</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function newDraft(){
  document.getElementById('f-name').value='';document.getElementById('f-project').value='';
  document.getElementById('f-week').value='';document.getElementById('f-issue').value='';
  document.getElementById('f-completion').value='';document.getElementById('f-notes').value='';
  document.getElementById('f-inspo').value='';
  wins=[];actions=[];phases=[];payments=[];
  renderWins();renderActions();renderPhases();renderPayments();
  activeVersionId=null;renderVersionList();generatedHTML='';
  showToast('New draft started');
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

document.getElementById('save-modal').addEventListener('click',function(e){if(e.target===this)closeSaveModal();});
document.getElementById('save-name').addEventListener('keydown',function(e){if(e.key==='Enter')saveVersion();if(e.key==='Escape')closeSaveModal();});

renderWins();renderActions();renderPhases();renderPayments();renderVersionList();generateAndPreview();
</script>
